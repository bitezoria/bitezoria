<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bitezoria</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/contact.css">
<link rel="stylesheet" href="assets/css/components.css">
</head>

<body>

<!-- LOADER -->
<div id="loader"></div>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- ============================= -->
<!-- CONTACT SECTION -->
<!-- ============================= -->
<section class="contact-container">

    <h1>Contact Us</h1>

    <div class="contact-grid">

        <!-- LEFT -->
        <div class="contact-info">
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Email:</strong> bitezoria@email.com</p>
            <p><strong>Time:</strong> 10 AM – 10 PM</p>
        </div>

        <!-- RIGHT FORM -->
        <form class="contact-form">

            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message"></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

    <!-- MAP -->
    <div class="map">
        <iframe 
            src="https://maps.google.com/maps?q=Assam&t=&z=13&ie=UTF8&iwloc=&output=embed"
            frameborder="0">
        </iframe>
    </div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<!-- JS -->
<script src="assets/js/main.js"></script>
<script src="assets/js/pages/contact.js"></script>

</body>
</html>
