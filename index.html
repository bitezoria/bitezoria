<!-- ============================= -->
<!-- BITEZORIA - HOME PAGE -->
<!-- ============================= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- BASIC META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TITLE -->
    <title>Bitezoria</title>

    <!-- FAVICON  -->
    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">
    <link rel="shortcut icon" href="assets/icon/favicon.ico" type="image/x-icon">

    <!-- CSS LINK -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/sections/hero.css">
<link rel="stylesheet" href="assets/css/sections/categories.css">
<link rel="stylesheet" href="assets/css/sections/featured.css">
<link rel="stylesheet" href="assets/css/pages/home.css">
<link rel="stylesheet" href="assets/css/animations.css">
</head>

<body>
<div id="loader"></div>
<!-- ============================= -->
<!-- NAVBAR (Component Load) -->
<!-- ============================= -->
<div id="navbar"></div>

<!-- ============================= -->
<!-- HERO SECTION -->
<!-- ============================= -->
<section class="hero">

    <div class="hero-content">
        <h1>Enter the Kingdom of Bitezoria</h1>
        <p>This isn’t just food. It’s a mood you can taste.</p>

        <a href="menu.html" class="btn-primary">
            Explore Menu
        </a>
    </div>

    <!-- Background Effect Layer -->
    <div class="liquid-bg"></div>

</section>

<!-- ============================= -->
<!-- CATEGORY PREVIEW -->
<!-- ============================= -->
<section class="categories">

    <div class="category" data-type="tea">
        <img src="assets/svg/icons/tea.svg" alt="">
        <p>Fresh Tea</p>
    </div>

    <div class="category" data-type="coffee">
        <img src="assets/svg/icons/coffee.svg" alt="">
        <p>Brew Coffeee</p>
    </div>

    <div class="category" data-type="shake">
        <img src="assets/svg/icons/shake.svg" alt="">
        <p>Cold Shakes</p>
    </div>

    <div class="category" data-type="pizza">
        <img src="assets/svg/icons/pizza.svg" alt="">
        <p>Loaded Pizza</p>
    </div>

</section>

<!-- ============================= -->
<!-- FEATURED ITEMS -->
<!-- ============================= -->
<section class="featured">

    <div class="card">Oreo Blast Shake</div>
    <div class="card">Cheese Burst Pizza</div>
    <div class="card">Spicy Peri Fries</div>
    <div class="card">Classic Cappuccino</div>

</section>

<!-- ============================= -->
<!-- BRAND STORY -->
<!-- ============================= -->
<section class="story">

    <p class="reveal-text">
        Bitezoria is not a cafe, it's a mood...
    </p>

</section>

<!-- ============================= -->
<!-- CTA -->
<!-- ============================= -->
<section class="cta">

    <h2>Visit Us</h2>
    <button class="btn-primary">Contact</button>

</section>

<!-- ============================= -->
<!-- FOOTER -->
<!-- ============================= -->
<div id="footer"></div>

<!-- ============================= -->
<!-- JS -->
<!-- ============================= -->
<script src="assets/js/main.js"></script>
<script type="module" src="assets/js/pages/home.js"></script>
<script type="module" src="assets/js/animations.js"></script>
</body>
</html>
